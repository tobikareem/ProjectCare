name: Deploy Wireframe to GitHub Pages

on:
  push:
    branches: ["main"]
    paths:
      - "Documentation/Wireframes/**"
  workflow_dispatch: # allow manual trigger from GitHub UI

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time; cancel any in-progress run if a new push arrives
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Pages site
        # Copy the wireframe into a _site folder and rename it index.html
        # so GitHub Pages serves it at the root URL with no extra path needed.
        run: |
          mkdir -p _site
          cp Documentation/Wireframes/carepath-wireframe.html _site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
