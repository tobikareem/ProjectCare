# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest
    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: Y
          MSSQL_SA_PASSWORD: ${{ secrets.CAREPATH_TEST_SQL_PASSWORD || 'CarePath_Test_2026!' }}
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"${MSSQL_SA_PASSWORD}\" -C -Q \"SELECT 1\""
          --health-interval 10s
          --health-timeout 5s
          --health-retries 20

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.x
    - name: Restore dependencies
      run: dotnet restore
    - name: Build
      run: dotnet build --no-restore
    - name: Test
      env:
        CAREPATH_TEST_SQLSERVER_CONNECTION_STRING: Server=localhost,1433;Database={DatabaseName};User Id=sa;Password=${{ secrets.CAREPATH_TEST_SQL_PASSWORD || 'CarePath_Test_2026!' }};Encrypt=True;TrustServerCertificate=True
      run: dotnet test --no-build --verbosity normal
